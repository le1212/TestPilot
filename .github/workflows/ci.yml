name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ───────────────────── 检查阶段（每次 push / PR 都跑） ─────────────────────

  backend-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest httpx

      - name: Lint with ruff
        run: ruff check app/ --select E,W,F --ignore E501

      - name: Run tests
        run: pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found yet — skipping"

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: TypeScript type check & build
        run: npm run build

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt || true

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=high || true

  # ───────────────── 方案 A：SSH 部署到服务器（裸机 / 虚拟机） ─────────────────
