server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # Frontend static files — served directly by Nginx from the shared build volume
    # In docker-compose the testpilot image has /app/frontend/dist; we use a copy approach.
    # For simplicity: proxy to backend which can also serve static if needed,
    # but prefer copying dist into the nginx container via a shared volume.
    # Here we proxy non-API/WS requests to testpilot as a fallback for SPA routing.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://testpilot:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # WebSocket
    location /ws {
        proxy_pass http://testpilot:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}
