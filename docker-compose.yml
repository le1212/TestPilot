services:
  testpilot:
    build: .
    ports:
      - "8001:8001"
    environment:
      JWT_SECRET: "${JWT_SECRET:-change-me-to-a-strong-random-string}"
      DATABASE_URL: "sqlite+aiosqlite:///./data/testplatform.db"
      CORS_ORIGINS: "http://localhost,http://localhost:80"
      LOG_LEVEL: "INFO"
    volumes:
      - tp-data:/app/backend/data
      - frontend-dist:/app/frontend-serve
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      testpilot:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tp-data:
  frontend-dist:
